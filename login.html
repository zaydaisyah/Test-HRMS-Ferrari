<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ital Auto HRMS - Sign In</title>
  <meta name="description" content="Official HR and Admin Management Portal Sign In.">
  <link rel="stylesheet" href="index.css">
  <!-- FontAwesome for Premium Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Confetti for premium micro-animations -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <style>
    :root {
      --ferrari-red: #E00000;
      --ferrari-red-rgb: 224, 0, 0;
    }
    
    body {
      background: radial-gradient(circle at 80% 20%, #440003 0%, #150002 60%, #050001 100%) !important;
      overflow: hidden;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
    }
    
    /* Dynamic background shapes */
    .login-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1;
      overflow: hidden;
      background: transparent !important;
    }
    
    /* Floating animated rings inside background */
    .floating-ring-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      transform-style: preserve-3d;
      will-change: transform;
    }

    /* Ring 1 - Large metallic/glowing red ring left */
    .ring-1 {
      width: 600px;
      height: 600px;
      border: 35px solid rgba(224, 0, 0, 0.08);
      border-top-color: rgba(224, 0, 0, 0.25);
      border-bottom-color: rgba(255, 255, 255, 0.15);
      left: -200px;
      top: 10%;
      box-shadow: 
        inset 0 0 50px rgba(224, 0, 0, 0.2),
        0 0 80px rgba(224, 0, 0, 0.15);
      animation: spin 35s linear infinite;
    }

    /* Ring 2 - Large ring right top */
    .ring-2 {
      width: 700px;
      height: 700px;
      border: 45px solid rgba(224, 0, 0, 0.05);
      border-left-color: rgba(224, 0, 0, 0.2);
      border-right-color: rgba(255, 255, 255, 0.1);
      right: -250px;
      top: -10%;
      box-shadow: 
        inset 0 0 60px rgba(224, 0, 0, 0.15),
        0 0 100px rgba(224, 0, 0, 0.1);
      animation: spin-reverse 45s linear infinite;
    }

    /* Ring 3 - Small ring center background */
    .ring-3 {
      width: 300px;
      height: 300px;
      border: 20px solid rgba(224, 0, 0, 0.10);
      border-bottom-color: rgba(224, 0, 0, 0.3);
      left: 45%;
      bottom: 15%;
      box-shadow: 
        inset 0 0 30px rgba(224, 0, 0, 0.25),
        0 0 50px rgba(224, 0, 0, 0.2);
      animation: spin 20s linear infinite;
    }

    /* Glowing ambient lights in background */
    .glow-light {
      position: absolute;
      border-radius: 50%;
      filter: blur(140px);
      pointer-events: none;
      opacity: 0.65;
      z-index: 0;
    }
    
    .glow-1 {
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(224, 0, 0, 0.35) 0%, rgba(224, 0, 0, 0) 70%);
      left: 10%;
      top: 20%;
    }
    
    .glow-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 70%);
      right: 15%;
      bottom: 10%;
    }

    @keyframes spin {
      0% { transform: rotate(0deg) rotateX(15deg) rotateY(10deg); }
      100% { transform: rotate(360deg) rotateX(15deg) rotateY(10deg); }
    }

    @keyframes spin-reverse {
      0% { transform: rotate(360deg) rotateX(-20deg) rotateY(15deg); }
      100% { transform: rotate(0deg) rotateX(-20deg) rotateY(15deg); }
    }

    /* Glassmorphism Card styling */
    .login-card {
      width: 100%;
      max-width: 440px !important;
      padding: 3rem 2.5rem !important;
      background: rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(25px) saturate(160%) !important;
      -webkit-backdrop-filter: blur(25px) saturate(160%) !important;
      border: 1px solid rgba(255, 255, 255, 0.18) !important;
      border-radius: 24px !important;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        inset 0 1px 1px rgba(255, 255, 255, 0.15) !important;
      z-index: 10;
      position: relative;
      overflow: visible !important;
    }
    
    /* Logo style */
    .logo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 2.25rem !important;
      text-align: center;
    }

    .ferrari-logo-small {
      width: 48px;
      height: 48px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
    }

    .system-title-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .company-name {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .system-name {
      color: #FFFFFF;
      font-size: 2.1rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1.1;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .system-subtitle {
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.8rem;
      font-weight: 500;
      margin-top: 2px;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .form-group label {
      display: block !important;
      font-size: 0.8rem !important;
      font-weight: 600 !important;
      color: rgba(255, 255, 255, 0.85) !important;
      margin-bottom: 0.5rem !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
    }

    .password-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .password-label-row label {
      margin-bottom: 0 !important;
    }

    .forgot-link {
      font-size: 0.78rem;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.65);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .forgot-link:hover {
      color: #FFFFFF;
    }

    .input-with-icon {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-with-icon input {
      width: 100%;
      background-color: #FFFFFF !important;
      border: 1px solid rgba(255, 255, 255, 0.2) !important;
      border-radius: 12px !important;
      padding: 12px 16px 12px 42px !important;
      font-size: 0.95rem !important;
      color: #1F2937 !important;
      font-weight: 500 !important;
      box-shadow: none !important;
      transition: all 0.2s ease !important;
      outline: none;
    }

    .input-with-icon input::placeholder {
      color: #9CA3AF !important;
      opacity: 0.85;
    }

    .input-with-icon input:focus {
      border-color: #FFFFFF !important;
      background-color: #FFFFFF !important;
      box-shadow: 0 0 0 4px rgba(224, 0, 0, 0.25) !important;
    }

    .input-icon {
      position: absolute;
      left: 16px !important;
      color: #6B7280 !important;
      font-size: 1.05rem !important;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    /* Submit Button styling */
    .btn-primary {
      background: linear-gradient(135deg, #E00000 0%, #B00000 100%) !important;
      color: #FFFFFF !important;
      border-radius: 12px !important;
      padding: 13px 24px !important;
      font-size: 0.95rem !important;
      font-weight: 700 !important;
      box-shadow: 0 6px 16px rgba(224, 0, 0, 0.3) !important;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
      margin-top: 1.5rem !important;
      width: 100%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #FF1A1A 0%, #D00000 100%) !important;
      box-shadow: 0 8px 20px rgba(224, 0, 0, 0.45) !important;
      transform: translateY(-2px) !important;
    }

    .btn-primary:active {
      transform: translateY(0) !important;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.75rem 0 1.25rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .divider::before {
      margin-right: .75em;
    }

    .divider::after {
      margin-left: .75em;
    }

    .divider span {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    /* Social Login row */
    .social-login-row {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .social-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 10px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }

    .social-btn:hover {
      background: #FFFFFF;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
    }

    .social-icon {
      width: 18px;
      height: 18px;
    }

    .social-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #374151;
    }

    /* Card Footer styling */
    .card-footer {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-top: 1rem;
    }

    .register-link {
      color: #FFFFFF;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .register-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- ========================================== -->
  <!-- TOAST NOTIFICATION CONTAINER               -->
  <!-- ========================================== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ========================================== -->
  <!-- LOGIN SCREEN                               -->
  <!-- ========================================== -->
  <div id="login-screen" class="login-container">
    <div class="floating-ring-container">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
    </div>
    
    <div class="glow-light glow-1"></div>
    <div class="glow-light glow-2"></div>
    
    <div class="login-card">
      <div class="logo-section">
        <svg class="ferrari-logo-small" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
          <path d="M30,5 C40,5 48,10 48,15 C48,35 30,55 30,55 C30,55 12,35 12,15 C12,10 20,5 30,5 Z" fill="var(--ferrari-yellow)" />
          <path d="M30,12 L30,48 C30,48 40,32 40,18 C40,14 35,12 30,12 Z" fill="#1A1A1A" fill-opacity="0.15" />
          <path d="M30,5 C40,5 48,10 48,15 C48,35 30,55 30,55 C30,55 12,35 12,15 C12,10 20,5 30,5 Z" stroke="#1A1A1A" stroke-width="1.5" fill="none" />
          <polygon points="30,16 33,23 40,24 35,29 36,36 30,32 24,36 25,29 20,24 27,23" fill="#1A1A1A" />
        </svg>
        <div class="system-title-container">
          <div class="company-name">Ital Auto SDN BHD</div>
          <div class="system-name">HRMS</div>
          <div class="system-subtitle">Travel Warrant and E-Leave System</div>
        </div>
      </div>

        <form id="login-form">
        <div class="form-group">
          <label for="staff-id-input">Staff ID</label>
          <div class="input-with-icon">
            <span class="input-icon"><i class="fa-solid fa-id-card"></i></span>
            <input type="text" id="staff-id-input" placeholder="e.g. IM022 or IM043" required autocomplete="username">
          </div>
        </div>

        <!-- Password field — visible only for HR/Admin accounts -->
        <div class="form-group" id="password-field-group" style="
          max-height: 0;
          overflow: hidden;
          opacity: 0;
          transition: max-height 0.35s ease, opacity 0.3s ease, margin 0.3s ease;
          margin-bottom: 0;
        ">
          <label for="password-input">Password</label>
          <div class="input-with-icon">
            <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
            <input type="password" id="password-input" placeholder="Enter HR password" autocomplete="current-password">
          </div>
          <div id="hr-badge" style="
            margin-top: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(176,0,0,0.12);
            border: 1px solid rgba(176,0,0,0.3);
            color: #ff6b6b;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 50px;
            letter-spacing: 0.5px;
          ">
            <i class="fa-solid fa-shield-halved"></i> HR / ADMIN ACCOUNT
          </div>
        </div>

        <button type="submit" id="login-submit-btn" class="btn-primary">
          <span>Sign In</span>
        </button>
      </form>

  <script src="app.js"></script>
  <script>
    // HR admin IDs that require a password
    const HR_ADMIN_IDS = ['IM022', 'IM030'];

    const staffInput    = document.getElementById('staff-id-input');
    const pwdGroup      = document.getElementById('password-field-group');
    const pwdInput      = document.getElementById('password-input');

    function checkIfAdminId() {
      const val = staffInput.value.trim().toUpperCase();
      if (HR_ADMIN_IDS.includes(val)) {
        // Reveal password field
        pwdGroup.style.maxHeight  = '160px';
        pwdGroup.style.opacity    = '1';
        pwdGroup.style.marginBottom = '1.25rem';
        pwdInput.required = true;
      } else {
        // Hide password field
        pwdGroup.style.maxHeight  = '0';
        pwdGroup.style.opacity    = '0';
        pwdGroup.style.marginBottom = '0';
        pwdInput.required = false;
        pwdInput.value = '';
      }
    }

    staffInput.addEventListener('input', checkIfAdminId);
    staffInput.addEventListener('blur',  checkIfAdminId);
  </script>

</body>
</html>
